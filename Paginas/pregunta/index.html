<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Me amas?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fddde6;
        }
        .container {
            margin-top: 50px;
        }
        .question {
            font-size: 24px;
            font-weight: bold;
        }
        .buttons {
            margin-top: 20px;
            position: relative;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            position: absolute;
            transition: all 0.2s;
        }
        #yesBtn {
            background-color: #ff4081;
            color: white;
        }
        #noBtn {
            background-color: #ff5252;
            color: white;
            left: 120px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://i.pinimg.com/originals/e9/c4/2e/e9c42e162d7095d73968532fda857317.gif" alt="cute gif" width="200">
        <p class="question">¿Me amas?</p>
        <div class="buttons">
            <button id="yesBtn">Sí</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById("noBtn");
        const yesBtn = document.getElementById("yesBtn");
        const container = document.querySelector(".container");
        
        noBtn.addEventListener("mouseover", () => {
            const newX = Math.floor(Math.random() * (window.innerWidth - noBtn.offsetWidth));
            const newY = Math.floor(Math.random() * (window.innerHeight - noBtn.offsetHeight));
            
            noBtn.style.left = `${newX}px`;
            noBtn.style.top = `${newY}px`;
            noBtn.style.position = "absolute";
        });

        yesBtn.addEventListener("click", () => {
            alert("¡Sabía que me amabas! ❤️");
        });
    </script>
</body>
</html>
